    description: >-
      The CloudZero API V2 enables you to automate the collection, allocation,
      and analysis of your infrastructure spend. It provides endpoints for
      querying billing costs and dimensions, managing insights and budgets,
      sending unit metric and allocation telemetry data, and ingesting cost
      data from any source via the AnyCost framework.
